<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildBox Fullstack Test App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 { color: #2d3436; }
        .status {
            margin: 1.5rem 0;
            padding: 1rem;
            border-radius: 8px;
            font-weight: bold;
        }
        .success { background-color: #d1fae5; color: #065f46; }
        .error { background-color: #fee2e2; color: #991b1b; }
        .loading { background-color: #e0f2fe; color: #075985; }
        pre {
            background: #f1f2f6;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            text-align: left;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 BuildBox Test App</h1>
        <p>If you see this, the <strong>Frontend Deployment</strong> is working!</p>
        
        <div id="api-status" class="status loading">
            Checking Backend Connection...
        </div>

        <pre id="api-response">Backend response will appear here...</pre>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const statusEl = document.getElementById('api-status');
            const responseEl = document.getElementById('api-response');

            try {
                // Determine API URL (assuming api.domain.com pattern)
                const currentHost = window.location.hostname;
                const apiUrl = `http://api.${currentHost}/`;

                statusEl.textContent = `Connecting to: ${apiUrl}`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Backend unreachable');
                
                const data = await response.json();
                
                statusEl.className = 'status success';
                statusEl.textContent = '✅ Backend is reachable!';
                responseEl.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                statusEl.className = 'status error';
                statusEl.textContent = '❌ Backend connection failed';
                responseEl.textContent = err.message;
            }
        });
    </script>
</body>
</html>
